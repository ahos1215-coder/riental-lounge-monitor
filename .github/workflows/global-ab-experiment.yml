name: Global vs per-store experiment

# Manual, read-only A/B experiment: does ONE pooled LightGBM (store_id as a
# feature) match/beat the current per-store models, and does either beat the
# seasonal-naive baseline? Trains throwaway models in memory; writes nothing to
# Supabase. The verdict table is printed in the job log and the full result is
# uploaded as a JSON artifact. Run AFTER the recency fix so the data is recent.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "training window in days (default 180)"
        required: false
      limit:
        description: "row cap (default 1000000)"
        required: false
      objective:
        description: "LightGBM objective to test (count-data A/B)"
        required: false
        default: "regression"
        type: choice
        options:
          - regression
          - poisson
          - tweedie

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run A/B experiment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TIMEZONE: Asia/Tokyo
          # inputs via env (not interpolated into the shell) to avoid injection
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_OBJECTIVE: ${{ github.event.inputs.objective }}
        run: |
          set -euo pipefail
          ARGS=(--json global_ab.json)
          if [ -n "${INPUT_DAYS:-}" ]; then ARGS+=(--days "$INPUT_DAYS"); fi
          if [ -n "${INPUT_LIMIT:-}" ]; then ARGS+=(--limit "$INPUT_LIMIT"); fi
          if [ -n "${INPUT_OBJECTIVE:-}" ]; then ARGS+=(--objective "$INPUT_OBJECTIVE"); fi
          python scripts/experiments/global_vs_per_store.py "${ARGS[@]}"

      - name: Upload result JSON
        uses: actions/upload-artifact@v4
        with:
          name: global-ab-result
          path: global_ab.json
          if-no-files-found: warn
