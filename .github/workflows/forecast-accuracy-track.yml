name: Forecast accuracy tracking

# Daily "answer-check" loop for the LIVE forecast (distinct from training holdout):
#   - snapshot (~18:10 JST): save tonight's served forecast before the night starts
#   - score   (~06:10 JST): compare last night's snapshot to the actual 19:00-05:00
#     counts and record per-store live MAE + a rolling summary in Supabase Storage.
# See plan/FORECAST_ACCURACY.md. No new DB/bucket — reuses the model bucket.
#
# 【2026-07-18 追記・B1固定バグ#1】snapshot(mode=snapshot, 18:10 JST想定)は、
# warm-cdn.yml で実測済みの同じ GitHub Actions `schedule:` 間引き問題
# （10分毎・19:00-23:50想定60回に対し実発火5回=8.3%、plan/CDN_WARMING_LOCAL.md）を
# 踏んでおり、実測8夜で実際の発火は19:22〜21:16 JST（遅延72〜186分）だった。
# この遅延が18:40 JST（18:10+30分猶予）のカットオフを超えると、本番の
# tonight-anchoring が既にかかった予測を「開店前・アンカー無しの答え合わせ」として
# 保存してしまう汚染（カンニング）が起きる。scripts/score_forecasts.py 側は
# captured_at_utc からこれを検知し contaminated_capture フラグでローリング集計
# （live_mae履歴・blend_weights）から除外する対処を実装済み（根治ではなく検知+除外）。
#
# 根治として、warm-cdn.yml / scripts/warm_cdn_local.py と同じパターンで、snapshot の
# プライマリ実行主体をオーナーPCの Task Scheduler（タスク名 `MEGRIBI-snapshot`、
# 毎日18:10 JST、実体は `python scripts/snapshot_forecasts.py`）へ移す方針とする
# （このコメントは移行準備の告知。Task Scheduler 登録はオーナー側の実施待ちのため、
# 下の `schedule:` はそのまま維持し、GHA側はローカルジョブが未登録の間の実質プライマリ
# 兼、登録後はバックアップ/日和見実行として残す）。
# score（06:10 JST・mode=score）側は変更しない — GHA のままで問題ない
# （汚染検知はスコアリング側で完結するため、スコアリングの実行主体には依存しない）。

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "snapshot | score"
        required: true
        default: "score"
        type: choice
        options:
          - snapshot
          - score
  schedule:
    # 【2026-07-18・B1バグ#1根治】snapshot(18:10 JST)のGHA定発火を停止した。
    # 理由: GHA schedule間引きで実際は19-21時(開店後)に走り、その時刻の予測は
    # 当夜アンカー補正で「答えを見た後」になる=精度測定がカンニング状態だった
    # (現存16夜すべて汚染を実証)。snapshotのプライマリはオーナーPCの Task Scheduler
    # 「MEGRIBI-snapshot」(毎日18:10厳守)へ完全移管。ローカル18:10の直後にGHAが
    # 遅れて発火すると「きれいな夜」を「汚染夜」で上書きしてしまうため、GHA側の
    # 定発火は残さない(warm-cdn/daily/weeklyと同じローカル主導判断)。
    # 手動の穴埋めが要る時は workflow_dispatch で mode=snapshot を明示実行できる。
    - cron: "10 21 * * *"  # 06:10 JST — score last night vs actuals（採点はGHAのまま）

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # snapshot モードは v2 併記で oriental/ml/night_type を import し、祝日判定に
      # jpholiday を使う。両モード共通で入れておく（軽量・score モードでは未使用）。
      - name: Install jpholiday
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jpholiday==1.0.3"

      - name: Decide mode
        id: decide
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_MODE:-}" ]; then
            MODE="$INPUT_MODE"
          elif [ "${SCHEDULE:-}" = "10 9 * * *" ]; then
            MODE="snapshot"
          else
            MODE="score"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "resolved mode: $MODE"

      - name: Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FORECAST_MODEL_BUCKET: ${{ vars.FORECAST_MODEL_BUCKET }}
          # 本番の答え合わせで ML がナイーブ基準に負けた/劣化した夜、score_forecasts.py の
          # _alert() が直接 Slack/Discord に通知するためのフック（Act 断線の修理）。
          # ジョブ失敗時の notify-on-failure(secrets: inherit) とは別経路の即時アラート。
          OPS_NOTIFY_WEBHOOK_URL: ${{ secrets.OPS_NOTIFY_WEBHOOK_URL }}
          TIMEZONE: Asia/Tokyo
          MODE: ${{ steps.decide.outputs.mode }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "snapshot" ]; then
            python scripts/snapshot_forecasts.py
          else
            python scripts/score_forecasts.py
          fi

  notify-on-failure:
    needs: [track]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Forecast accuracy tracking"
