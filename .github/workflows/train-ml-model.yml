name: Train ML model

on:
  workflow_dispatch:
    inputs:
      days:
        description: "学習対象日数（例: 180）"
        required: false
      limit:
        description: "取得上限件数（例: 120000）"
        required: false
      store_id:
        description: "対象店舗ID（空なら全店舗）"
        required: false
  schedule:
    # 日次: UTC 20:30 = JST 05:30（Optuna なし、固定パラメータで再学習のみ）
    - cron: "30 20 * * *"
    # 週次: 毎週月曜 UTC 18:00 = JST 03:00（Optuna HPO あり）
    - cron: "0 18 * * 1"

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # 週次スケジュール (cron "0 18 * * 1") の場合のみ Optuna を有効化。
      # 日次スケジュールでは固定パラメータで再学習のみ（GHA 実行時間 90% 削減）。
      # workflow_dispatch（手動実行）時は vars.ML_OPTUNA_ENABLED をそのまま使う。
      - name: Determine Optuna mode
        id: optuna
        run: |
          if [ "${{ github.event.schedule }}" = "0 18 * * 1" ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
            echo "[train-ml] Weekly HPO run — Optuna ENABLED"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "[train-ml] Daily retrain — Optuna DISABLED (fixed params)"
          else
            echo "enabled=${{ vars.ML_OPTUNA_ENABLED || '1' }}" >> "$GITHUB_OUTPUT"
            echo "[train-ml] Manual dispatch — Optuna=${{ vars.ML_OPTUNA_ENABLED || '1' }}"
          fi

      - name: Train and upload model artifacts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORECAST_MODEL_BUCKET: ${{ vars.FORECAST_MODEL_BUCKET }}
          FORECAST_MODEL_PREFIX: ${{ vars.FORECAST_MODEL_PREFIX }}
          FORECAST_MODEL_SCHEMA_VERSION: ${{ vars.FORECAST_MODEL_SCHEMA_VERSION }}
          TIMEZONE: Asia/Tokyo
          ML_TRAIN_DAYS: ${{ vars.ML_TRAIN_DAYS }}
          ML_TRAIN_LIMIT: ${{ vars.ML_TRAIN_LIMIT }}
          ML_TRAIN_STORE_ID: ""
          ML_TRAIN_WEIGHT_PEAK: ${{ vars.ML_TRAIN_WEIGHT_PEAK }}
          ML_TRAIN_WEIGHT_RAIN: ${{ vars.ML_TRAIN_WEIGHT_RAIN }}
          ML_OPTUNA_ENABLED: ${{ steps.optuna.outputs.enabled }}
          ML_OPTUNA_TRIALS: ${{ vars.ML_OPTUNA_TRIALS }}
        run: |
          set -euo pipefail
          export FORECAST_MODEL_BUCKET="${FORECAST_MODEL_BUCKET:-ml-models}"
          export FORECAST_MODEL_PREFIX="${FORECAST_MODEL_PREFIX:-forecast/latest}"
          export FORECAST_MODEL_SCHEMA_VERSION="${FORECAST_MODEL_SCHEMA_VERSION:-v2}"
          export ML_TRAIN_DAYS="${ML_TRAIN_DAYS:-180}"
          export ML_TRAIN_LIMIT="${ML_TRAIN_LIMIT:-120000}"
          export ML_TRAIN_WEIGHT_PEAK="${ML_TRAIN_WEIGHT_PEAK:-1.8}"
          export ML_TRAIN_WEIGHT_RAIN="${ML_TRAIN_WEIGHT_RAIN:-1.8}"
          export ML_OPTUNA_ENABLED="${ML_OPTUNA_ENABLED:-1}"
          export ML_OPTUNA_TRIALS="${ML_OPTUNA_TRIALS:-30}"
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.days }}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --days ${{ github.event.inputs.days }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.store_id }}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --store-id ${{ github.event.inputs.store_id }}"
          fi
          python scripts/train_ml_model.py ${EXTRA_ARGS}

  notify-on-failure:
    needs: [train]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Train ML model"
