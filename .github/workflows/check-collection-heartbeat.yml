name: Check collection heartbeat

# 収集プロセス（multi_collect.py / /tasks/multi_collect）の生存監視。
#
# 背景: 全ての下流（forecast, ML学習, blog, weekly insights）は Supabase の
# `logs` テーブルに依存しているが、収集自体を監視するものが無かった。収集が
# 静かに止まっても、下流は「古いデータのまま」成功し続けてしまう。
#
# 収集は cron-job.org が /tasks/multi_collect を 5分毎にトリガーする
# (plan/ARCHITECTURE.md: "cron-job.org が 5 分毎にトリガー")。
#
# 【2026-07-10 修正】実データ上、新規行が入るのは営業ウィンドウ(JST 19:00〜翌05:00)
# のみで、昼間は新規行ゼロが正常（店舗別120行/夜=夜間のみ、直近3日の実測で確認）。
# 旧実装は「24時間収集」前提の一律30分閾値だったため、毎日昼間に3〜4回の偽アラート
# を出していた（2026-07-08〜10の failure 履歴すべてが昼間帯）。
# 現在は時間帯対応: 夜間=30分閾値 / 昼間=「昨夜が営業終了(05:00 JST)の45分以内まで
# 完走していたか」を判定する。チェック自体は従来どおり2時間毎(24/7)に実行する。
#
# 必要な Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    # 2時間毎（24/7）
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      threshold_minutes:
        description: "許容する最終収集からの経過分数（既定30分）"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  check-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      detail: ${{ steps.check.outputs.detail }}
    steps:
      - name: Query Supabase for newest log timestamp
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          THRESHOLD_MINUTES: ${{ github.event.inputs.threshold_minutes || '30' }}
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone

          url = (os.environ.get("SUPABASE_URL") or "").rstrip("/")
          key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY") or ""
          if not url or not key:
              print("::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secret 未設定")
              sys.exit(1)

          try:
              threshold_minutes = int(os.environ.get("THRESHOLD_MINUTES") or "30")
          except ValueError:
              threshold_minutes = 30

          q = urllib.parse.urlencode({
              "select": "ts",
              "order": "ts.desc",
              "limit": "1",
          })
          req = urllib.request.Request(
              f"{url}/rest/v1/logs?{q}",
              headers={"apikey": key, "Authorization": f"Bearer {key}"},
          )

          last_err = None
          rows = None
          for _ in range(3):
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      rows = json.loads(r.read().decode())
                      break
              except Exception as e:
                  last_err = e
          if rows is None:
              print(f"::error::Supabase 照会に失敗: {last_err}")
              sys.exit(1)

          if not rows:
              detail = "logs テーブルが空です（収集が一度も成功していない可能性）。"
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
                  fh.write(detail + "\n")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("detail<<EOF\n" + detail + "\nEOF\n")
              print(f"::error::{detail}")
              sys.exit(1)

          newest_raw = rows[0]["ts"]
          newest = datetime.fromisoformat(str(newest_raw).replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          age_minutes = (now - newest).total_seconds() / 60.0

          # 営業時間ウィンドウ(JST 19:00〜翌05:00)を理解した判定にする。
          # 実データは営業終了(〜04:55 JST)から開店(19:00 JST)まで新規行が入らないのが
          # 正常(店が閉まっていて人数が取れない)。旧実装は24時間一律で「30分無ければ
          # 異常」としており、毎日昼間に3〜4回の偽アラートを出していた(2026-07-08〜10の
          # 失敗履歴で確認)。
          # - 夜間(19:00〜05:00 JST): 従来どおり 経過<=閾値(30分) を要求
          # - 昼間(05:00〜19:00 JST): 「昨夜が閉店近くまで収集できていたか」を要求
          #   (最新行が直近の営業終了時刻 05:00 JST の45分以上前で止まっていれば、
          #    昨夜の収集が途中で死んでいた=本物の異常として検知できる)
          JST = timezone(timedelta(hours=9))
          now_jst = now.astimezone(JST)
          in_window = (now_jst.hour >= 19) or (now_jst.hour < 5)

          if in_window:
              mode = f"夜間窓(閾値={threshold_minutes}分)"
              ok = age_minutes <= threshold_minutes
              fail_msg = f"収集が {age_minutes:.1f} 分間停止しています（閾値 {threshold_minutes} 分）。"
          else:
              # 直近の営業終了 = 今日の 05:00 JST (05:00〜19:00 の昼間帯なので必ず今日)
              window_end = now_jst.replace(hour=5, minute=0, second=0, microsecond=0)
              gap_minutes = (window_end - newest.astimezone(JST)).total_seconds() / 60.0
              mode = "昼間(前夜の完走チェック)"
              ok = gap_minutes <= 45
              fail_msg = (
                  f"昨夜の収集が営業終了の {gap_minutes:.0f} 分前で止まっています"
                  f"(最新 {newest_raw})。夜間の収集が途中で死んでいた可能性。"
              )

          lines = [
              f"収集ハートビートチェック [{mode}]",
              f"- 最新ログ ts: {newest_raw}",
              f"- 現在時刻(JST): {now_jst.isoformat()}",
              f"- 経過: {age_minutes:.1f} 分",
              f"- 判定: {'OK' if ok else 'NG'}",
          ]
          detail = "\n".join(lines)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(detail + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("detail<<EOF\n" + detail + "\nEOF\n")
          print(detail)

          if not ok:
              print(f"::error::{fail_msg}")
              sys.exit(1)
          print("OK: 収集は正常です。")
          PY

  notify:
    needs: [check-heartbeat]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "収集ハートビートチェック"
      custom_body: |
        ⚠️ 収集プロセス（/tasks/multi_collect）が長時間停止している可能性があります（PC停止 / Render障害 / cron-job.org障害など）。
        ${{ needs.check-heartbeat.outputs.detail }}
