name: Check collection heartbeat

# 収集プロセス（multi_collect.py / /tasks/multi_collect）の生存監視。
#
# 背景: 全ての下流（forecast, ML学習, blog, weekly insights）は Supabase の
# `logs` テーブルに依存しているが、収集自体を監視するものが無かった。収集が
# 静かに止まっても、下流は「古いデータのまま」成功し続けてしまう。
#
# 収集は cron-job.org が /tasks/multi_collect を 5分毎にトリガーする
# (plan/ARCHITECTURE.md: "cron-job.org が 5 分毎にトリガー")。
#
# 【2026-07-10 修正】実データ上、新規行が入るのは営業ウィンドウ(JST 19:00〜翌05:00)
# のみで、昼間は新規行ゼロが正常（店舗別120行/夜=夜間のみ、直近3日の実測で確認）。
# 旧実装は「24時間収集」前提の一律30分閾値だったため、毎日昼間に3〜4回の偽アラート
# を出していた（2026-07-08〜10の failure 履歴すべてが昼間帯）。
# 現在は時間帯対応: 夜間=30分閾値 / 昼間=「昨夜が営業終了(05:00 JST)の45分以内まで
# 完走していたか」を判定する。チェック自体は従来どおり2時間毎(24/7)に実行する。
#
# 【2026-07-11 追加】上記の全体チェックは「logs 全体の最新1行」しか見ないため、複数店の
# うち1店だけが静かに死んでも他店の新しい行に隠れて検知できない(実例: ol_sapporo_ag が
# 閉店で 2026-05-11 に凍結していたが全体チェックは緑のままだった)。そこで stores.json の
# 各店ごとに最新 ts を個別照会し、PER_STORE_STALE_DAYS 日(既定3)より古い/1行も無い店舗を
# 店名付きで検知する店舗別チェックを追加した(全体ロジックは不変、加算判定)。stores.json を
# 読むため checkout ステップを追加している。
#
# 【2026-07-18 修正】夜間モード(19:00〜翌05:00)の判定は19:00:00ちょうどから30分閾値を
# 適用していたが、実データでは夜の1行目は19:03〜19:04 JST頃にしか着地しない。そのため
# 19:00:00〜19:04台にチェックが走ると「前夜最後の行からの経過(=昼間ぶん、数百分)」が
# そのまま閾値超過となり誤報していた(実例: 2026-07-15 19:01:57「846分停止」、実際の
# 1行目は19:03:20着地）。夜窓開始(19:00 JST)から30分間はグレースピリオドとして無条件
# OKにし、それ以降は従来どおりの30分閾値判定に戻す(詳細はチェックスクリプト内コメント)。
#
# 必要な Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    # 2時間毎（24/7）
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      threshold_minutes:
        description: "許容する最終収集からの経過分数（既定30分）"
        required: false
        default: "30"
      per_store_stale_days:
        description: "店舗別: 最新行がこれより古い店舗を異常扱い（既定3日 / 単一店の死を検知）"
        required: false
        default: "3"

permissions:
  contents: read

jobs:
  check-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      detail: ${{ steps.check.outputs.detail }}
    steps:
      - name: Checkout（店舗マスタ stores.json を読むため）
        uses: actions/checkout@v4
      - name: Query Supabase for newest log timestamp
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          THRESHOLD_MINUTES: ${{ github.event.inputs.threshold_minutes || '30' }}
          PER_STORE_STALE_DAYS: ${{ github.event.inputs.per_store_stale_days || '3' }}
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone

          url = (os.environ.get("SUPABASE_URL") or "").rstrip("/")
          key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY") or ""
          if not url or not key:
              print("::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secret 未設定")
              sys.exit(1)

          try:
              threshold_minutes = int(os.environ.get("THRESHOLD_MINUTES") or "30")
          except ValueError:
              threshold_minutes = 30

          q = urllib.parse.urlencode({
              "select": "ts",
              "order": "ts.desc",
              "limit": "1",
          })
          req = urllib.request.Request(
              f"{url}/rest/v1/logs?{q}",
              headers={"apikey": key, "Authorization": f"Bearer {key}"},
          )

          last_err = None
          rows = None
          for _ in range(3):
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      rows = json.loads(r.read().decode())
                      break
              except Exception as e:
                  last_err = e
          if rows is None:
              print(f"::error::Supabase 照会に失敗: {last_err}")
              sys.exit(1)

          if not rows:
              detail = "logs テーブルが空です（収集が一度も成功していない可能性）。"
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
                  fh.write(detail + "\n")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("detail<<EOF\n" + detail + "\nEOF\n")
              print(f"::error::{detail}")
              sys.exit(1)

          newest_raw = rows[0]["ts"]
          newest = datetime.fromisoformat(str(newest_raw).replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          age_minutes = (now - newest).total_seconds() / 60.0

          # 営業時間ウィンドウ(JST 19:00〜翌05:00)を理解した判定にする。
          # 実データは営業終了(〜04:55 JST)から開店(19:00 JST)まで新規行が入らないのが
          # 正常(店が閉まっていて人数が取れない)。旧実装は24時間一律で「30分無ければ
          # 異常」としており、毎日昼間に3〜4回の偽アラートを出していた(2026-07-08〜10の
          # 失敗履歴で確認)。
          # - 夜間(19:00〜05:00 JST): 従来どおり 経過<=閾値(30分) を要求
          # - 昼間(05:00〜19:00 JST): 「昨夜が閉店近くまで収集できていたか」を要求
          #   (最新行が直近の営業終了時刻 05:00 JST の45分以上前で止まっていれば、
          #    昨夜の収集が途中で死んでいた=本物の異常として検知できる)
          JST = timezone(timedelta(hours=9))
          now_jst = now.astimezone(JST)
          in_window = (now_jst.hour >= 19) or (now_jst.hour < 5)

          if in_window:
              # 【2026-07-18 修正】夜窓の開始境界(19:00:00 JST ちょうど)に実データの
              # 1行目が着地するわけではない。実測では最初の1行は 19:03〜19:04 JST 頃に
              # 届く(収集トリガーの cron-job.org は5分毎で、店舗一覧SSRの取得・書き込み
              # にも数十秒かかるため)。旧実装は age_minutes(=最新行からの経過)を
              # そのまま30分閾値と比較していたため、19:00:00〜19:04台にチェックが
              # 走ると、前夜最後の行からの経過(=昼間ぶん丸ごと、数百分)がそのまま
              # 閾値超過となり誤報していた
              # (実例: 2026-07-15 19:01:57 に「846分停止」で誤アラート。実際の1行目は
              # 19:03:20着地で、その数分後には正常化していた)。
              # 対策: 夜窓開始(19:00 JST。日付跨ぎの 00:00〜04:59 帯は前日19:00)から
              # 何分経ったかも算出し、min(実経過, 夜窓開始からの経過) を閾値と比較する。
              # 夜窓開始から threshold_minutes 以内は、まだ1行も来ていなくてもそもそも
              # 「陳腐化」しようがない(開店直後で当然データが薄い)ため無条件でOKとする。
              # threshold_minutes を超えて経過した後は、夜窓開始からの経過が閾値を
              # 上回るため実質的に従来どおり age_minutes <= threshold_minutes と同じ
              # 判定に戻る(収集が正常なら age_minutes は常に小さいまま)。
              if now_jst.hour >= 19:
                  night_start = now_jst.replace(hour=19, minute=0, second=0, microsecond=0)
              else:
                  night_start = (now_jst - timedelta(days=1)).replace(
                      hour=19, minute=0, second=0, microsecond=0
                  )
              minutes_since_night_start = (now_jst - night_start).total_seconds() / 60.0
              effective_age_minutes = min(age_minutes, minutes_since_night_start)

              mode = (
                  f"夜間窓(閾値={threshold_minutes}分、開始から{minutes_since_night_start:.1f}分)"
              )
              ok = effective_age_minutes <= threshold_minutes
              fail_msg = f"収集が {age_minutes:.1f} 分間停止しています（閾値 {threshold_minutes} 分）。"
          else:
              # 直近の営業終了 = 今日の 05:00 JST (05:00〜19:00 の昼間帯なので必ず今日)
              window_end = now_jst.replace(hour=5, minute=0, second=0, microsecond=0)
              gap_minutes = (window_end - newest.astimezone(JST)).total_seconds() / 60.0
              mode = "昼間(前夜の完走チェック)"
              ok = gap_minutes <= 45
              fail_msg = (
                  f"昨夜の収集が営業終了の {gap_minutes:.0f} 分前で止まっています"
                  f"(最新 {newest_raw})。夜間の収集が途中で死んでいた可能性。"
              )

          # ---- 全体判定（既存ロジック; 判定基準は不変） --------------------------
          lines = [
              f"収集ハートビートチェック [{mode}]",
              f"- 最新ログ ts: {newest_raw}",
              f"- 現在時刻(JST): {now_jst.isoformat()}",
              f"- 経過: {age_minutes:.1f} 分",
              f"- 判定(全体): {'OK' if ok else 'NG'}",
          ]

          # ---- 追加: 店舗別 staleness チェック ----------------------------------
          # 全体チェックは「最新の1行」しか見ないため、複数店のうち1店だけが静かに死んでも
          # (例: ol_sapporo_ag が閉店で 2026-05-11 に凍結) 他店の新しい行に隠れて検知できない。
          # ここでは stores.json の各店について「その店の最新 ts」を個別に照会し、
          # PER_STORE_STALE_DAYS 日より古ければ(または1行も無ければ)店名付きで異常を報告する。
          # 閾値は日単位(既定3日)で毎晩の閉店ウィンドウ(~14時間)を十分に上回るため、
          # 時間帯を問わず誤検知しない。全体ロジック(上)はそのまま維持し、こちらは加算判定。
          try:
              per_store_stale_days = float(os.environ.get("PER_STORE_STALE_DAYS") or "3")
          except ValueError:
              per_store_stale_days = 3.0

          def _newest_ts_for_store(store_id):
              sq = urllib.parse.urlencode({
                  "store_id": f"eq.{store_id}",
                  "select": "ts",
                  "order": "ts.desc",
                  "limit": "1",
              })
              sreq = urllib.request.Request(
                  f"{url}/rest/v1/logs?{sq}",
                  headers={"apikey": key, "Authorization": f"Bearer {key}"},
              )
              err = None
              for _ in range(2):
                  try:
                      with urllib.request.urlopen(sreq, timeout=15) as r:
                          data = json.loads(r.read().decode())
                          return (data[0]["ts"] if data else None), None
                  except Exception as e:
                      err = e
              return None, err

          stores_json_path = os.path.join(os.getcwd(), "frontend", "src", "data", "stores.json")
          store_rows = []
          try:
              with open(stores_json_path, encoding="utf-8") as fh:
                  store_rows = json.load(fh)
          except Exception as e:
              print(f"::warning::stores.json を読めませんでした({e}) — 店舗別チェックをスキップします。")

          stale_stores = []
          query_errors = []
          checked = 0
          for entry in store_rows:
              sid = (entry.get("store_id") or "").strip()
              if not sid:
                  continue
              label = entry.get("label") or entry.get("store") or entry.get("slug") or sid
              ts_raw, err = _newest_ts_for_store(sid)
              if err is not None:
                  query_errors.append(f"{sid}({label})")
                  continue
              checked += 1
              if ts_raw is None:
                  stale_stores.append(f"{sid}({label}): 収集行なし")
                  continue
              try:
                  ts_dt = datetime.fromisoformat(str(ts_raw).replace("Z", "+00:00"))
              except ValueError:
                  stale_stores.append(f"{sid}({label}): ts 解釈不能({ts_raw})")
                  continue
              store_age_days = (now - ts_dt).total_seconds() / 86400.0
              if store_age_days > per_store_stale_days:
                  stale_stores.append(
                      f"{sid}({label}): 最新 {ts_raw} = {store_age_days:.1f}日前 (>{per_store_stale_days:g}日)"
                  )

          lines.append(
              f"- 店舗別チェック(閾値={per_store_stale_days:g}日): "
              f"{checked}店照会 / 陳腐化 {len(stale_stores)}店 / 照会失敗 {len(query_errors)}店"
          )
          for s in stale_stores:
              lines.append(f"    停止疑い -> {s}")

          detail = "\n".join(lines)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(detail + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("detail<<EOF\n" + detail + "\nEOF\n")
          print(detail)

          # 全体NG または 店舗別で陳腐化があれば失敗。照会失敗(=一時的な通信エラー)のみでは
          # 落とさない(全体チェックが疎通を保証済み。誤検知回避)。
          problems = []
          if not ok:
              print(f"::error::{fail_msg}")
              problems.append("全体")
          if stale_stores:
              print(f"::error::収集が止まっている店舗があります: {', '.join(stale_stores)}")
              problems.append("店舗別")
          if problems:
              sys.exit(1)
          print("OK: 収集は正常です（全体 + 全店とも新鮮）。")
          PY

  notify:
    needs: [check-heartbeat]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "収集ハートビートチェック"
      custom_body: |
        ⚠️ 収集プロセス（/tasks/multi_collect）が長時間停止している可能性があります（PC停止 / Render障害 / cron-job.org障害など）。
        ${{ needs.check-heartbeat.outputs.detail }}
