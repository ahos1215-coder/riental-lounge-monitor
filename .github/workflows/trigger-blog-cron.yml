# 定時ブログ下書きの本番トリガ（メイン）。
# - JST 18:00 → evening_preview（18時便）、JST 21:30 → late_update（21時半便）
# - UTC cron（GitHub は常に UTC）: 09:00 = JST 18:00、12:30 = JST 21:30（日本は DST なし）
#
# 必要な Repository Secrets: CRON_SECRET, VERCEL_BLOG_CRON_BASE_URL（末尾スラッシュなし）
# Variables は不要（旧 BLOG_CRON_GHA_ENABLED は廃止）

name: Blog draft cron (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "手動実行時のエディション（定時実行では無視されます）"
        type: choice
        required: true
        default: evening_preview
        options:
          - evening_preview
          - late_update
  schedule:
    # 毎日 UTC 09:00 → 日本時間 18:00
    - cron: "0 9 * * *"
    # 毎日 UTC 12:30 → 日本時間 21:30
    - cron: "30 12 * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: shard-1
            stores: "nagasaki,fukuoka,kokura,oita,kumamoto,miyazaki,kagoshima,okinawa_ag,gangnam,sapporo_ag"
          - name: shard-2
            stores: "sendai_ag,shibuya,ebisu,shibuya_ag,shinjuku,ueno,ueno_ag,kashiwa,machida,yokohama"
          - name: shard-3
            stores: "omiya,utsunomiya,takasaki,nagoya_ag,nagoya_nishiki,nagoya_sakae,shizuoka,hamamatsu,kanazawa_ag,osaka_ekimae"
          - name: shard-4
            stores: "umeda_ag,tenma,shinsaibashi,namba,kyoto,kobe,okayama,hiroshima_ag"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Resolve edition and URL
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_EDITION: ${{ github.event.inputs.edition }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "edition=${INPUT_EDITION}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE" in
              "0 9 * * *")
                echo "edition=evening_preview" >> "$GITHUB_OUTPUT"
                ;;
              "30 12 * * *")
                echo "edition=late_update" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::未対応の schedule: $SCHEDULE"
                exit 1
                ;;
            esac
            echo "trigger=schedule" >> "$GITHUB_OUTPUT"
          else
            echo "::error::未対応の event: $EVENT_NAME"
            exit 1
          fi

      - name: GET /api/cron/blog-draft
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.VERCEL_BLOG_CRON_BASE_URL }}
          EDITION: ${{ steps.meta.outputs.edition }}
          STORES: ${{ matrix.shard.stores }}
          SHARD_NAME: ${{ matrix.shard.name }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${BASE_URL:-}" ]; then
            echo "::error::Repository Secrets に CRON_SECRET と VERCEL_BLOG_CRON_BASE_URL を設定してください。"
            exit 1
          fi
          BASE="${BASE_URL%/}"
          # edition / source / stores(shard) を明示（本番は github_actions_cron）
          URL="${BASE}/api/cron/blog-draft?edition=${EDITION}&source=github_actions_cron&stores=${STORES}"
          echo "Triggering shard=${SHARD_NAME}: ${URL%%\?*}?edition=***&source=github_actions_cron&stores=***"
          RESP="$(curl -sS -f -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: GitHub-Actions-blog-draft-cron" \
            "$URL")"
          echo "$RESP"
          if command -v jq >/dev/null 2>&1; then
            TOTAL_MS="$(echo "$RESP" | jq -r '.duration_ms // 0')"
            NEAR_TIMEOUT="$(echo "$RESP" | jq -r '.near_timeout // false')"
            echo "duration_ms=${TOTAL_MS}"
            echo "near_timeout=${NEAR_TIMEOUT}"
            echo "store_durations (${SHARD_NAME}):"
            echo "$RESP" | jq -r '.results[]? | "- \(.slug): \(.duration_ms // 0)ms (ok=\(.ok))"'
            if [ "$NEAR_TIMEOUT" = "true" ]; then
              echo "::warning::blog-draft cron duration is close to Vercel maxDuration. shard=${SHARD_NAME}"
            fi
          fi

  notify-on-failure:
    needs: [trigger]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Blog draft cron (GitHub Actions)"
