# 定時ブログ下書きの本番トリガ（メイン）。
# - JST 18:00 → evening_preview（18時便）、JST 21:30 → late_update（21時半便）
# - UTC cron（GitHub は常に UTC）: 09:00 = JST 18:00、12:30 = JST 21:30（日本は DST なし）
#
# 必要な Repository Secrets: CRON_SECRET, VERCEL_BLOG_CRON_BASE_URL（末尾スラッシュなし）
# Variables は不要（旧 BLOG_CRON_GHA_ENABLED は廃止）

name: Blog draft cron (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "手動実行時のエディション（定時実行では無視されます）"
        type: choice
        required: true
        default: evening_preview
        options:
          - evening_preview
          - late_update
  schedule:
    - cron: "0 9 * * *"    # JST 18:00 → evening_preview
    - cron: "30 12 * * *"  # JST 21:30 → late_update

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        store:
          - nagasaki
          - fukuoka
          - kokura
          - oita
          - kumamoto
          - miyazaki
          - kagoshima
          - okinawa_ag
          - gangnam
          - sapporo_ag
          - sendai_ag
          - shibuya
          - ebisu
          - shibuya_ag
          - shinjuku
          - ueno
          - ueno_ag
          - kashiwa
          - machida
          - yokohama
          - omiya
          - utsunomiya
          - takasaki
          - nagoya_ag
          - nagoya_nishiki
          - nagoya_sakae
          - shizuoka
          - hamamatsu
          - kanazawa_ag
          - osaka_ekimae
          - umeda_ag
          - tenma
          - shinsaibashi
          - namba
          - kyoto
          - kobe
          - okayama
          - hiroshima_ag
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Resolve edition and URL
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_EDITION: ${{ github.event.inputs.edition }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "${INPUT_EDITION:-}" ]; then
              echo "::error::edition が指定されていません。workflow_dispatch inputs.edition を指定してください。"
              exit 1
            fi
            EDITION="${INPUT_EDITION}"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              EDITION="late_update"
            else
              EDITION="evening_preview"
            fi
          else
            echo "::error::Unsupported event: $EVENT_NAME"
            exit 1
          fi
          echo "edition=${EDITION}" >> "$GITHUB_OUTPUT"
          echo "trigger=${EVENT_NAME}" >> "$GITHUB_OUTPUT"

      - name: GET /api/cron/blog-draft
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.VERCEL_BLOG_CRON_BASE_URL }}
          EDITION: ${{ steps.meta.outputs.edition }}
          STORE: ${{ matrix.store }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${BASE_URL:-}" ]; then
            echo "::error::Repository Secrets に CRON_SECRET と VERCEL_BLOG_CRON_BASE_URL を設定してください。"
            exit 1
          fi
          BASE="${BASE_URL%/}"
          URL="${BASE}/api/cron/blog-draft?edition=${EDITION}&source=github_actions_cron&store=${STORE}"
          echo "Triggering store=${STORE}: ${URL%%\?*}?edition=***&source=github_actions_cron&store=***"
          RESP="$(curl -sS -f -X GET \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 300 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: GitHub-Actions-blog-draft-cron" \
            "$URL")"
          echo "$RESP"
          if command -v jq >/dev/null 2>&1; then
            DURATION_MS="$(echo "$RESP" | jq -r '.duration_ms // 0')"
            NEAR_TIMEOUT="$(echo "$RESP" | jq -r '.near_timeout // false')"
            echo "duration_ms(${STORE})=${DURATION_MS}"
            echo "near_timeout(${STORE})=${NEAR_TIMEOUT}"
            if [ "$NEAR_TIMEOUT" = "true" ]; then
              echo "::warning::blog-draft cron duration is close to Vercel maxDuration. store=${STORE}"
            fi
          fi

  # matrix 各ジョブは continue-on-error のため、一部失敗でもワークフローは緑になり得る。
  # 失敗店舗がある場合のみ Ops Webhook へ通知（正本は引き続き Supabase blog_drafts）。
  summarize-blog-matrix:
    name: Summarize matrix results
    needs: trigger
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_notify: ${{ steps.check.outputs.should_notify }}
      notify_body: ${{ steps.check.outputs.notify_body }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const all = [];
            for (let page = 1; page <= 5; page++) {
              const { data } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
                page,
              });
              all.push(...data.jobs);
              if (data.jobs.length < 100) break;
            }
            const slugRe = /\btrigger\s*\(([^)]+)\)/;
            const matrixJobs = all.filter((j) => slugRe.test(j.name));
            const failedOrCancelled = matrixJobs.filter(
              (j) => j.conclusion === "failure" || j.conclusion === "cancelled",
            );
            const successMatrix = matrixJobs.filter((j) => j.conclusion === "success");
            const stepFailedSuccess = (
              await Promise.all(
                successMatrix.map(async (j) => {
                  const { data: detail } = await github.rest.actions.getJobForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: j.id,
                  });
                  const hasFailedStep = (detail.steps || []).some((s) => s.conclusion === "failure");
                  return hasFailedStep ? j : null;
                }),
              )
            ).filter((x) => x != null);
            const bad = [...failedOrCancelled, ...stepFailedSuccess];
            if (bad.length === 0) {
              core.setOutput("should_notify", "false");
              core.setOutput("notify_body", "");
              return;
            }
            const slugs = bad.map((j) => {
              const m = j.name.match(slugRe);
              return m ? m[1] : j.name;
            });
            const uniq = [...new Set(slugs)].sort();
            const msg = [
              "定時ブログ Cron: 店舗 " + uniq.length + " 件に問題（" + uniq.join(", ") + "）。",
              "ジョブは緑でも GET ステップが continue-on-error で失敗（504 等）した場合を含みます。",
              "成否の正本は Supabase blog_drafts（リポジトリ直下 STATUS.md）。",
              "repo: " + context.repo.owner + "/" + context.repo.repo,
              "ref: " + context.ref,
            ].join(" ");
            core.setOutput("should_notify", "true");
            core.setOutput("notify_body", msg);

  notify-partial-blog-failures:
    needs: summarize-blog-matrix
    if: needs.summarize-blog-matrix.outputs.should_notify == 'true'
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Blog draft cron (partial store failures)"
      custom_body: ${{ needs.summarize-blog-matrix.outputs.notify_body }}

  notify-on-failure:
    needs: [trigger]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Blog draft cron (GitHub Actions)"
