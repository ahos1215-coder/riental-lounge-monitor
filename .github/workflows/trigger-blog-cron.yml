# 定時ブログ下書きの本番トリガ（メイン）。
# - JST 18:00 → evening_preview（18時便）、JST 21:30 → late_update（21時半便）
# - UTC cron（GitHub は常に UTC）: 09:00 = JST 18:00、12:30 = JST 21:30（日本は DST なし）
#
# 必要な Repository Secrets: CRON_SECRET, VERCEL_BLOG_CRON_BASE_URL（末尾スラッシュなし）
# Variables は不要（旧 BLOG_CRON_GHA_ENABLED は廃止）

name: Blog draft cron (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "手動実行時のエディション（定時実行では無視されます）"
        type: choice
        required: true
        default: evening_preview
        options:
          - evening_preview
          - late_update
  schedule:
    # 毎日 UTC 09:00 → 日本時間 18:00
    - cron: "0 9 * * *"
    # 毎日 UTC 12:30 → 日本時間 21:30
    - cron: "30 12 * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Resolve edition and URL
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_EDITION: ${{ github.event.inputs.edition }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "edition=${INPUT_EDITION}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE" in
              "0 9 * * *")
                echo "edition=evening_preview" >> "$GITHUB_OUTPUT"
                ;;
              "30 12 * * *")
                echo "edition=late_update" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::未対応の schedule: $SCHEDULE"
                exit 1
                ;;
            esac
            echo "trigger=schedule" >> "$GITHUB_OUTPUT"
          else
            echo "::error::未対応の event: $EVENT_NAME"
            exit 1
          fi

      - name: GET /api/cron/blog-draft
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.VERCEL_BLOG_CRON_BASE_URL }}
          EDITION: ${{ steps.meta.outputs.edition }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${BASE_URL:-}" ]; then
            echo "::error::Repository Secrets に CRON_SECRET と VERCEL_BLOG_CRON_BASE_URL を設定してください。"
            exit 1
          fi
          BASE="${BASE_URL%/}"
          # edition と source を明示（本番は github_actions_cron）
          URL="${BASE}/api/cron/blog-draft?edition=${EDITION}&source=github_actions_cron"
          echo "Triggering: ${URL%%\?*}?edition=***&source=github_actions_cron"
          curl -sS -f -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: GitHub-Actions-blog-draft-cron" \
            "$URL"

  notify-on-failure:
    needs: [trigger]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Blog draft cron (GitHub Actions)"
