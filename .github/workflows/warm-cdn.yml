# Vercel CDN warming for store APIs.
#
# 【2026-07-10 更新】プライマリはローカル実行に移行済み。このワークフローは
# バックアップ（保険）としてのみ残す。
#
# 実測（2026-07-08〜10, 2晩）で GitHub Actions の `schedule:` は「10分毎・19:00〜23:50」
# の想定60回に対して実際の発火は5回（8.3%）、間隔が1.5〜3時間空くこともあり、事実上
# 温めが機能していなかった（GitHub Actions のスケジューラ側の遅延/間引きが原因。既知の
# 制約 — 下記コメント参照）。そのためプライマリの実行主体を、既に MEGRIBI-daily-* /
# MEGRIBI-weekly（毎日18:00・21:30・毎週水6:30の本番ジョブ）を安定運用しているオーナーの
# 24時間稼働 Windows PC の Task Scheduler（タスク名 `MEGRIBI-warm-cdn`）に切り替えた。
# 実体は scripts/warm_cdn_local.py（stdlib のみ・pip 不要）。詳細は
# plan/CDN_WARMING_LOCAL.md、Task Scheduler 登録コマンドはそのスクリプトの docstring
# 冒頭を参照。
#
# このワークフローは「GitHub Actions のスケジューラがたまたま時刻通りに発火した回」に
# 限り追加で温めるだけの日和見バックアップとして、スケジュールはそのまま残す
# （ローカル実行が主、これは保険）。
#
# 目的: Vercel の Edge/CDN キャッシュ（/api/range・/api/range_multi・/api/forecast_today・
# /api/forecast_today_multi・/api/megribi_score・/api/forecast_snapshot に付いている
# s-maxage/stale-while-revalidate）を定期的に温め続け、実訪問者がコールドキャッシュ
# （〜1.8秒〜9秒）ではなく温キャッシュ（〜10-30ms）を引くようにする。
#
# 対象URL（frontend/src/app/hooks/storePreviewSnapshot.ts・
# frontend/src/app/stores/stores-list-client.tsx・frontend/src/app/home-client.tsx の
# 実装から抽出。CDNキャッシュはURLの完全一致がキーなので、クライアントが実際に発行する
# URLと同じ形式・同じパラメータ順で温めること）:
#   店舗詳細ページ（今日/昨日タブ）× 全店舗:
#     今日:       /api/range?store=X&from=<JST今日>&to=<JST明日>&limit=240
#     昨日:       /api/range?store=X&from=<JST昨日>&to=<JST今日>&limit=1200
#     予測(今日):  /api/forecast_today?store=X
#     予測(昨日):  /api/forecast_snapshot?store=X&date=<JST昨日 YYYYMMDD>
#   一覧ページ（フィルタ無し・12件/ページ）× 1〜4ページ目:
#     /api/range_multi?stores=<csv>&limit=48
#     /api/forecast_today_multi?stores=<csv>
#   トップページ:
#     /api/range?store=<先頭店舗>&limit=48（未訪問者のフォールバック "last visited"）
#
# 【2026-07-11 削除】megribi_score（一覧ページ・トップページ双方）。バグ監査rank7:
# このAPIが支える「判定」表示（スコアバッジ・トップの「今夜のおすすめ TOP5」等）は
# frontend/src/lib/featureFlags.ts の SHOW_MEGRIBI_JUDGMENTS で一括OFF（2026-07-10〜、
# スコアロジックが実態と不一致のため）。UIが出ない間の温めは Render への純粋な無駄
# 負荷になるため対象から外した。フラグが true に戻ったら、上記URL一覧に
# `/api/megribi_score?stores=<csv>`（一覧ページ）と `/api/megribi_score`
# （トップページ、パラメータ無し・全店舗）を復元し、下の warm_one 呼び出しも戻すこと。
#
# 【意図的に含めないもの】店舗詳細ページの「ほかの店舗を見る」欄
# （StorePageClient.tsx digestStores）は店舗ごとに haversine 距離で選んだ最寄り4店舗の
# 組み合わせ（43店舗×固有CSV = 43通り）。bash/jq で緯度経度の最短距離計算を再実装するのは
# 壊れやすく割に合わないため、このバックアップ workflow では対象外とする
# （プライマリの scripts/warm_cdn_local.py は Python で完全に再現し、対象に含む）。
#
# コスト試算（無料枠を前提に保守的に設計）:
#   - 店舗数: 43（frontend/src/data/stores.json から動的取得。ハードコードしない）
#   - リクエスト数/回: 43店舗×4本 + 4ページ×2本 + トップ1本 = 181
#     （2026-07-11: megribi_score削除前は186。上のURL一覧参照）
#   - 実行間隔: 10分毎、19:00〜23:50 JST の窓のみ → 30回/日
#   - リクエスト数: 181 × 30 ≒ 5,430 リクエスト/日（≒ 16万/月）
#     ただし GitHub Actions の cron 精度の都合で実際に発火するのはこの一部
#     （このワークフローはあくまでバックアップ。主たる負荷はローカル実行側）。
#
# バックエンド保護:
#   - Render は gunicorn シングルワーカー1台のみ。43店舗を同時に叩くと自分自身で
#     詰まらせてしまう（self-inflicted contention）ため、店舗ループ・ページループの
#     区切りに 0.3秒 の sleep を挟んで平準化する（サンダリングハードを避ける）。
#   - 10分毎より高頻度にはしないこと。
#
# GitHub Actions の cron に関する注意:
#   - `schedule` は「最短5分間隔」が目安とされ、GitHub 側の負荷状況によっては
#     指定した時刻より遅延して実行される・場合によってはスキップされることがある
#     （GitHub Actions の既知の制約。2026-07-08〜10の実測で60回中5回しか発火せず、
#     これが「プライマリをローカルへ移す」判断の直接的な根拠になった）。
#
# チューニング方法:
#   - 間隔を変える: 下の `cron: "*/10 * * * *"` を変更（10分未満にはしないこと）。
#   - 対象を減らす: matrix ではなく単一ジョブの for ループなので、下の
#     STORES 取得・warm_one 呼び出しを編集するだけで調整できる。
#   - 無効化する: このファイルを削除するか、`schedule:` セクションをコメントアウトし
#     `workflow_dispatch` のみ残す（手動実行はいつでも可能なまま）。プライマリは
#     ローカル実行なので、これを無効化してもCDN温めは止まらない。
#
# 必要な Secrets: なし（本番URLは公開URLのため secrets 化していない）。

name: Warm CDN (store APIs)

on:
  # 【2026-07-08 オーナー承認で有効化・2026-07-10 バックアップ化】営業ピーク帯
  # 19:00〜24:00 JST のみ10分毎に巡回。プライマリはローカル Task Scheduler
  # （MEGRIBI-warm-cdn）に移行済み。窓の外（開店直後17-19時・深夜0時以降）は
  # ISR焼き込み+CDNキャッシュ(PR#53)が下支えする設計。
  # 5分未満にはしないこと（Render ワーカーへの負荷配慮。上記コメント参照）。
  schedule:
    # JST 19:00〜23:50 = UTC 10:00〜14:50 の10分毎
    - cron: "*/10 10-14 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "警告: 通常は変更不要。対象のベースURL（末尾スラッシュなし）"
        required: false
        default: "https://www.meguribi.jp"

# 1回の実行が10分以上かかった場合に多重実行しないためのガード
# （Render 単一ワーカーへの同時アクセスを増やさないため、前回の実行を待たずに
# 新しい実行が来ても古い方をキャンセルし、常に高々1本だけが走る状態にする）。
concurrency:
  group: warm-cdn
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Warm range/range_multi/forecast_today/forecast_today_multi/megribi_score/forecast_snapshot
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.meguribi.jp' }}
        run: |
          set -euo pipefail
          BASE="${BASE_URL%/}"
          STORES_JSON="frontend/src/data/stores.json"

          if [ ! -f "$STORES_JSON" ]; then
            echo "::error::${STORES_JSON} が見つかりません。"
            exit 1
          fi

          # 店舗スラッグは stores.json から動的に読む（ハードコードしない → 追加/削除に自動追従）。
          # 順序は frontend/src/app/config/stores.ts の STORES と同じ（= stores.json のファイル順）。
          mapfile -t SLUGS < <(jq -r '.[].slug' "$STORES_JSON")
          TOTAL_STORES="${#SLUGS[@]}"
          echo "対象店舗数: ${TOTAL_STORES}"

          if [ "$TOTAL_STORES" -eq 0 ]; then
            echo "::error::stores.json から店舗を1件も読み取れませんでした。"
            exit 1
          fi

          OK_COUNT=0
          FAIL_COUNT=0
          FAILED_LABELS=()

          warm_one() {
            local url="$1"
            local label="$2"
            # 失敗してもワークフロー全体は止めない（CDN warming はベストエフォート）。
            # -o /dev/null: ボディは不要（キャッシュに乗ればよい）。--max-time で1本あたりの
            # 詰まりを打ち切る（Render コールド起動想定で少し長め）。
            local status
            status="$(curl -s -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 \
              --max-time 20 \
              -H 'User-Agent: GitHub-Actions-warm-cdn' \
              "$url" || echo "000")"
            if [ "$status" = "200" ]; then
              OK_COUNT=$((OK_COUNT + 1))
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              FAILED_LABELS+=("${label}(${status})")
            fi
          }

          # 【重要】CDNキャッシュはURLの完全一致がキー。クライアント(storePreviewSnapshot.ts /
          # useStorePreviewData.ts)が実際に発行するURLと同じ形式・同じパラメータ順で温めること。
          #   今日:   /api/range?store=X&from=<JST今日>&to=<JST明日>&limit=240
          #   昨日:   /api/range?store=X&from=<JST昨日>&to=<JST今日>&limit=1200
          # from/to の基準日は「このワークフローは JST 19:00 以降にしか走らない」ため、
          # computeNightBaseDate(now) の "hour<19 ならベース日を1日戻す" 分岐は常に不成立
          # ＝ベース日=当日（JST）で単純化して問題ない、と確認済み
          # （frontend/src/app/hooks/storePreviewSnapshot.ts 参照。19:00より前に手動
          # workflow_dispatch した場合はこの単純化が外れる点に注意）。
          # 同様に「昨日」タブの夜は本ワークフローの実行時刻（19:00以降）では常に完了済み
          # のため、予測は必ず forecast_snapshot（日付は YYYYMMDD、ダッシュ無し）を使う。
          JST_TODAY="$(date -u -d '+9 hours' +%F)"
          JST_TOMORROW="$(date -u -d '+9 hours +1 day' +%F)"
          JST_YESTERDAY="$(date -u -d '+9 hours -1 day' +%F)"
          JST_YESTERDAY_COMPACT="$(date -u -d '+9 hours -1 day' +%Y%m%d)"

          for SLUG in "${SLUGS[@]}"; do
            warm_one "${BASE}/api/range?store=${SLUG}&from=${JST_TODAY}&to=${JST_TOMORROW}&limit=240" "${SLUG}:range_today"
            warm_one "${BASE}/api/range?store=${SLUG}&from=${JST_YESTERDAY}&to=${JST_TODAY}&limit=1200" "${SLUG}:range_yesterday"
            warm_one "${BASE}/api/forecast_today?store=${SLUG}" "${SLUG}:forecast_today"
            warm_one "${BASE}/api/forecast_snapshot?store=${SLUG}&date=${JST_YESTERDAY_COMPACT}" "${SLUG}:forecast_yesterday_snapshot"
            # Render ワーカーへのサンダリングハードを避けるための平準化。
            sleep 0.3
          done

          # 一覧ページ（/stores、フィルタ無し・12件/ページ）。順序は SLUGS と同じ
          # （stores-list-client.tsx のデフォルト表示＝フィルタ無しはこの順のまま12件区切り）。
          PAGE_SIZE=12
          TOTAL_PAGES=$(( (TOTAL_STORES + PAGE_SIZE - 1) / PAGE_SIZE ))
          for ((p = 0; p < TOTAL_PAGES; p++)); do
            start=$((p * PAGE_SIZE))
            PAGE_SLUGS=("${SLUGS[@]:$start:$PAGE_SIZE}")
            CSV="$(IFS=,; echo "${PAGE_SLUGS[*]}")"
            PAGE_LABEL="list_page$((p + 1))"
            warm_one "${BASE}/api/range_multi?stores=${CSV}&limit=48" "${PAGE_LABEL}:range_multi"
            warm_one "${BASE}/api/forecast_today_multi?stores=${CSV}" "${PAGE_LABEL}:forecast_today_multi"
            # 2026-07-11 削除: megribi_score（バグ監査rank7、上のヘッダーコメント参照）。
            sleep 0.3
          done

          # トップページ（home-client.tsx）: localStorage 未設定の初回訪問者が引く
          # フォールバック店舗（先頭店舗）の range。
          # 2026-07-11 削除: 無条件 megribi_score（バグ監査rank7、上のヘッダーコメント参照）。
          warm_one "${BASE}/api/range?store=${SLUGS[0]}&limit=48" "top:range_default_store"

          TOTAL_REQUESTS=$((OK_COUNT + FAIL_COUNT))
          echo "OK=${OK_COUNT} FAIL=${FAIL_COUNT} (合計 ${TOTAL_REQUESTS} リクエスト)"
          {
            echo "## CDN warming 結果（バックアップ workflow）"
            echo "- 対象店舗数: ${TOTAL_STORES}"
            echo "- 成功: ${OK_COUNT} / 失敗: ${FAIL_COUNT} / 合計: ${TOTAL_REQUESTS}"
            if [ "${#FAILED_LABELS[@]}" -gt 0 ]; then
              echo "- 失敗内訳（先頭50件）: ${FAILED_LABELS[*]:0:50}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 個別の失敗（一時的なコールドスタート等）はよくあるため許容するが、
          # 大半（半数超）が失敗した場合はバックエンド自体の障害を疑い、ジョブを失敗させて通知する。
          THRESHOLD=$((TOTAL_REQUESTS / 2))
          if [ "$FAIL_COUNT" -gt "$THRESHOLD" ]; then
            echo "::error::失敗が過半数（${FAIL_COUNT}/${TOTAL_REQUESTS}）。バックエンド障害の可能性があります。"
            exit 1
          fi

  notify-on-failure:
    needs: [warm]
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    secrets: inherit
    with:
      workflow_label: "Warm CDN (store APIs)"
